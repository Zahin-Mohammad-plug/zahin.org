name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build with Next.js
        run: pnpm run build

      # Assemble the published site:
      #   /      -> new "Zahin Universe" design (static, in /home)
      #   /v2/   -> this legacy Next.js portfolio (built into ./out under basePath /v2)
      #   /v1/   -> the original HTML/CSS/JS site
      - name: Assemble site (root design + /v2 + /v1)
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy
          cp -R home/. deploy/
          mkdir -p deploy/v2 && cp -R out/. deploy/v2/
          mkdir -p deploy/v1 && cp -R v1/. deploy/v1/
          cp CNAME deploy/CNAME
          touch deploy/.nojekyll
          echo "----- assembled deploy/ tree (top level) -----"
          ls -la deploy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
